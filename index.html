function saveState(state) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    localStorage.setItem(STORAGE_KEY + "-ts", String(Date.now()));
  } catch (e) {}
}

function getLocalTs() {
  return Number(localStorage.getItem(STORAGE_KEY + "-ts") || 0);
}

function fetchCloud(url) {
  return fetch(url + "?action=read&_t=" + Date.now(), { redirect: "follow" })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.status === "ok") return d;
      throw new Error(d.message || "cloud error");
    });
}

function pushCloud(url, state) {
  var ts = Date.now();
  localStorage.setItem(STORAGE_KEY + "-ts", String(ts));
  var payload = JSON.stringify({ timestamp: ts, data: state });

  // Use no-cors POST to bypass redirect/CORS issues
  // We can't read the response, so we verify with a subsequent GET
  return fetch(url, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: payload

    // Wait a moment for GAS to process, then verify
    return new Promise(function(resolve) { setTimeout(resolve, 1500); });
  }).then(function() {
    return fetch(url + "?action=read&_t=" + Date.now(), { redirect: "follow" });

        .then(function(r2) { return r2.json(); });
    }
    throw new Error("sync_verify_failed");
  });
